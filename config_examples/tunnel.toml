# Tunnel mode — proxy traffic through a relay server
# Widgets are served via the public tunnel URL

# Upstream MCP server
mcp = "http://localhost:9000/mcp"

# Widget source: URL (proxy mode) or path (static mode)
widgets = "http://localhost:4444"

# Local proxy port (optional in tunnel mode — uses a random port if omitted)
# port = 3000

# Relay server URL
relay_url = "https://tunnel.usestudykit.com"

# Fixed subdomain (optional — derived from tunnel_token if omitted)
# tunnel_subdomain = "03e48f685b45"

# Persistent tunnel identity (auto-saved on first run if omitted)
# tunnel_token = "90c74def-8fdc-4922-8702-44bc5cabf830"

# [csp]
# mode = "extend"  # "extend" (default) or "override"
# domains = ["https://media.usestudykit.com", "https://api.dictionaryapi.dev"]
